apiVersion: apps/v1
kind: Deployment
metadata:
  name: infigrate-api
  labels:
    app.kubernetes.io/name: infigrate
    app.kubernetes.io/component: api
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: infigrate
      app.kubernetes.io/component: api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: infigrate
        app.kubernetes.io/component: api
    spec:
      containers:
        - name: api
          image: infigrate-api:latest
          imagePullPolicy: IfNotPresent
          command: ["uvicorn"]
          args: ["backend.api:app", "--host", "0.0.0.0", "--port", "8000"]
          ports:
            - name: http
              containerPort: 8000
          env:
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_DB
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_PASSWORD
            - name: DATABASE_URL
              value: postgresql://$(POSTGRES_USER):$(POSTGRES_PASSWORD)@postgres:5432/$(POSTGRES_DB)
            - name: REDIS_URL
              value: redis://redis:6379/0
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: infigrate-api
  labels:
    app.kubernetes.io/name: infigrate
    app.kubernetes.io/component: api
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: infigrate
    app.kubernetes.io/component: api
  ports:
    - name: http
      port: 80
      targetPort: http
---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: infigrate-gateway
  labels:
    app.kubernetes.io/name: infigrate
    app.kubernetes.io/component: api
spec:
  gatewayClassName: infigrate-gateway-class
  listeners:
    - name: http
      protocol: HTTP
      port: 80
      hostname: api.infigrate.local
      allowedRoutes:
        namespaces:
          from: Same
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: infigrate-api
  labels:
    app.kubernetes.io/name: infigrate
    app.kubernetes.io/component: api
spec:
  parentRefs:
    - name: infigrate-gateway
      sectionName: http
  hostnames:
    - api.infigrate.local
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: infigrate-api
          port: 80
